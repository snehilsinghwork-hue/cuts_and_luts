<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Service Agreement — Snehil Singh</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0d1b2e;
    --navy-mid: #162640;
    --navy-light: #1e3354;
    --cream: #f5f0e8;
    --cream-dim: #c9bfa8;
    --accent: #c8a96e;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body {
    background:var(--navy); color:var(--cream);
    font-family:'DM Sans',sans-serif; font-weight:300;
    min-height:100vh; display:flex; flex-direction:column;
  }
  nav {
    padding:24px 48px; display:flex; align-items:center; justify-content:space-between;
    border-bottom:1px solid rgba(245,240,232,0.06);
  }
  .nav-logo {
    font-family:'Cormorant Garamond',serif; font-size:1.4rem; font-weight:300;
    color:var(--cream); letter-spacing:0.1em; text-decoration:none;
    position:relative; z-index:10;
  }
  .back-link {
    color:var(--cream-dim); text-decoration:none; font-size:0.78rem;
    letter-spacing:0.12em; text-transform:uppercase;
    display:flex; align-items:center; gap:8px;
    transition:color 0.3s ease;
    position:relative; z-index:10;
  }
  .back-link:hover { color:var(--accent); }

  main { flex:1; padding:64px 48px 100px; max-width:900px; margin:0 auto; width:100%; }
  .page-eyebrow {
    font-size:0.68rem; letter-spacing:0.3em; text-transform:uppercase;
    color:var(--accent); margin-bottom:24px;
    display:flex; align-items:center; gap:16px;
  }
  .page-eyebrow::before { content:''; display:block; width:40px; height:1px; background:var(--accent); }
  h1 {
    font-family:'Cormorant Garamond',serif; font-weight:300;
    font-size:clamp(2.2rem,5vw,3.4rem); line-height:1.1;
    color:var(--cream); margin-bottom:16px;
  }
  .page-sub {
    color:var(--cream-dim); font-size:1rem; line-height:1.7;
    max-width:560px; margin-bottom:48px;
  }

  .doc-pages {
    display:flex; flex-direction:column; gap:24px;
  }
  .doc-page {
    width:100%; height:auto; display:block;
    border:1px solid rgba(245,240,232,0.08);
    border-radius:4px;
    box-shadow:0 20px 60px rgba(0,0,0,0.4);
    pointer-events:none;
  }

  .doc-actions {
    margin-top:40px; display:flex; gap:16px; flex-wrap:wrap;
    position:relative; z-index:10;
  }
  .doc-btn {
    display:inline-flex; align-items:center; gap:10px;
    padding:14px 28px; border:1px solid rgba(200,169,110,0.4);
    color:var(--cream); text-decoration:none; font-size:0.78rem;
    letter-spacing:0.1em; text-transform:uppercase;
    transition:background 0.3s ease, border-color 0.3s ease;
    cursor:pointer; background:none;
    position:relative; z-index:10;
  }
  .doc-btn:hover { background:rgba(200,169,110,0.1); border-color:var(--accent); }
  .doc-btn.primary { background:var(--accent); color:var(--navy); border-color:var(--accent); }
  .doc-btn.primary:hover { background:var(--cream); }

  footer {
    padding:32px 48px; border-top:1px solid rgba(245,240,232,0.06);
    text-align:center; font-size:0.72rem; color:var(--cream-dim); letter-spacing:0.08em;
  }

  @media (max-width:700px) {
    nav, main, footer { padding-left:24px; padding-right:24px; }
  }
</style>
</head>
